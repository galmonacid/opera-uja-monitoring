name: CD Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "amplify.yml"
      - ".github/workflows/cd-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.AMPLIFY_APP_ID != '' && secrets.AMPLIFY_BRANCH != '' && secrets.AWS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'https://lg0yl7xofl.execute-api.eu-west-1.amazonaws.com/v1' }}
        run: npm run build
        working-directory: frontend

      - name: Package dist
        run: zip -r /tmp/frontend-dist.zip .
        working-directory: frontend/dist

      - name: Create deployment
        id: deployment
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ secrets.AMPLIFY_BRANCH }}
        run: |
          set -euo pipefail
          response=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --output json)
          job_id=$(printf '%s' "$response" | python3 -c "import json,sys; print(json.load(sys.stdin)['jobId'])")
          upload_url=$(printf '%s' "$response" | python3 -c \"import json,sys; print(json.load(sys.stdin)['zipUploadUrl'])\")
          echo \"job_id=$job_id\" >> \"$GITHUB_OUTPUT\"
          echo \"upload_url=$upload_url\" >> \"$GITHUB_OUTPUT\"

      - name: Upload dist
        run: |
          set -euo pipefail
          curl --fail --upload-file /tmp/frontend-dist.zip "${{ steps.deployment.outputs.upload_url }}"

      - name: Start deployment
        id: start
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ secrets.AMPLIFY_BRANCH }}
          AMPLIFY_JOB_ID: ${{ steps.deployment.outputs.job_id }}
        run: |
          set -euo pipefail
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-id "$AMPLIFY_JOB_ID"

      - name: Wait for deployment
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ secrets.AMPLIFY_BRANCH }}
          AMPLIFY_JOB_ID: ${{ steps.deployment.outputs.job_id }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 40); do
            status=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$AMPLIFY_JOB_ID" \
              --query 'job.summary.status' \
              --output text)
            echo "Amplify status: $status"
            if [ "$status" = "SUCCEED" ]; then
              exit 0
            fi
            if [ "$status" = "FAILED" ] || [ "$status" = "CANCELLED" ]; then
              exit 1
            fi
            sleep 15
          done
          echo "Amplify job timeout"
          exit 1
