name: cd-backend

on:
  push:
    branches: [main]
    paths:
      - infra/lambda-ingest-telemetry.yaml
      - infra/lambda-aggregations.yaml
      - infra/lambda-api.yaml
      - infra/api-gateway.yaml
      - infra/iot-rule-gw-jaen-energia.yaml
      - infra/iot-rule-gw-jaen-agua.yaml
      - infra/iot-rule-gw-linares-mix.yaml
      - infra/iot-rule-gw-autoconsumo-jaen.yaml
      - infra/iot-rule-gw-endesa-linares.yaml
      - infra/iot-rule-gw-endesa-jaen.yaml
      - lambda/**
      - scripts/**
      - seeds/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      STACK_PREFIX: uja
      LAMBDA_ARTIFACT_BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
      LAMBDA_KEY_SUFFIX: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3

      - name: Package Lambda
        run: |
          zip -j /tmp/lambda_ingest_telemetry.zip lambda/ingest_telemetry/lambda_function.py
          zip -j /tmp/lambda_calc_daily.zip lambda/calc_daily/lambda_function.py
          zip -j /tmp/lambda_calc_monthly.zip lambda/calc_monthly/lambda_function.py
          zip -j /tmp/lambda_calc_yearly.zip lambda/calc_yearly/lambda_function.py
          zip -j /tmp/lambda_api_public.zip lambda/api_public/lambda_function.py

      - name: Upload Lambda artifact
        run: |
          aws s3 cp /tmp/lambda_ingest_telemetry.zip \
            "s3://${LAMBDA_ARTIFACT_BUCKET}/lambda/lambda_ingest_telemetry-${LAMBDA_KEY_SUFFIX}.zip"
          aws s3 cp /tmp/lambda_calc_daily.zip \
            "s3://${LAMBDA_ARTIFACT_BUCKET}/lambda/lambda_calc_daily-${LAMBDA_KEY_SUFFIX}.zip"
          aws s3 cp /tmp/lambda_calc_monthly.zip \
            "s3://${LAMBDA_ARTIFACT_BUCKET}/lambda/lambda_calc_monthly-${LAMBDA_KEY_SUFFIX}.zip"
          aws s3 cp /tmp/lambda_calc_yearly.zip \
            "s3://${LAMBDA_ARTIFACT_BUCKET}/lambda/lambda_calc_yearly-${LAMBDA_KEY_SUFFIX}.zip"
          aws s3 cp /tmp/lambda_api_public.zip \
            "s3://${LAMBDA_ARTIFACT_BUCKET}/lambda/lambda_api_public-${LAMBDA_KEY_SUFFIX}.zip"

      - name: Deploy Lambda stack
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-lambda-ingest-telemetry" \
            --template-file infra/lambda-ingest-telemetry.yaml \
            --parameter-overrides \
              FunctionName=lambda_ingest_telemetry \
              CodeS3Bucket="${LAMBDA_ARTIFACT_BUCKET}" \
              CodeS3Key=lambda/lambda_ingest_telemetry-${LAMBDA_KEY_SUFFIX}.zip \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Deploy aggregation lambdas
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-lambda-aggregations" \
            --template-file infra/lambda-aggregations.yaml \
            --parameter-overrides \
              CodeS3Bucket="${LAMBDA_ARTIFACT_BUCKET}" \
              CodeS3KeyDaily=lambda/lambda_calc_daily-${LAMBDA_KEY_SUFFIX}.zip \
              CodeS3KeyMonthly=lambda/lambda_calc_monthly-${LAMBDA_KEY_SUFFIX}.zip \
              CodeS3KeyYearly=lambda/lambda_calc_yearly-${LAMBDA_KEY_SUFFIX}.zip \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Deploy API lambda
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-lambda-api" \
            --template-file infra/lambda-api.yaml \
            --parameter-overrides \
              FunctionName=lambda_api_public \
              CodeS3Bucket="${LAMBDA_ARTIFACT_BUCKET}" \
              CodeS3Key=lambda/lambda_api_public-${LAMBDA_KEY_SUFFIX}.zip \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Deploy API Gateway
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-api-gateway" \
            --template-file infra/api-gateway.yaml \
            --parameter-overrides \
              ApiName=uja-public-api \
              StageName=v1 \
              LambdaName=lambda_api_public \
              DeploymentVersion="${GITHUB_SHA}"

      - name: Create API deployment
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='uja-public-api'].id | [0]" --output text)
          aws apigateway create-deployment \
            --rest-api-id "${API_ID}" \
            --stage-name v1 \
            --description "ci-${GITHUB_SHA}"

      - name: Deploy IoT Rule
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-iot-rule-gw-jaen-energia" \
            --template-file infra/iot-rule-gw-jaen-energia.yaml \
            --parameter-overrides IngestLambdaName=lambda_ingest_telemetry
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-iot-rule-gw-jaen-agua" \
            --template-file infra/iot-rule-gw-jaen-agua.yaml \
            --parameter-overrides IngestLambdaName=lambda_ingest_telemetry
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-iot-rule-gw-linares-mix" \
            --template-file infra/iot-rule-gw-linares-mix.yaml \
            --parameter-overrides IngestLambdaName=lambda_ingest_telemetry
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-iot-rule-gw-autoconsumo-jaen" \
            --template-file infra/iot-rule-gw-autoconsumo-jaen.yaml \
            --parameter-overrides IngestLambdaName=lambda_ingest_telemetry
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-iot-rule-gw-endesa-linares" \
            --template-file infra/iot-rule-gw-endesa-linares.yaml \
            --parameter-overrides IngestLambdaName=lambda_ingest_telemetry
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-iot-rule-gw-endesa-jaen" \
            --template-file infra/iot-rule-gw-endesa-jaen.yaml \
            --parameter-overrides IngestLambdaName=lambda_ingest_telemetry

      - name: Load gateway_variable_map
        run: |
          python scripts/load_gateway_map.py \
            --file seeds/gateway_variable_map_gw_jaen_energia.csv \
            --table gateway_variable_map
          python scripts/load_gateway_map.py \
            --file seeds/gateway_variable_map_gw_jaen_agua.csv \
            --table gateway_variable_map
          python scripts/load_gateway_map.py \
            --file seeds/gateway_variable_map_gw_linares_mix.csv \
            --table gateway_variable_map
          python scripts/load_gateway_map.py \
            --file seeds/gateway_variable_map_gw_autoconsumo_jaen.csv \
            --table gateway_variable_map
          python scripts/load_gateway_map.py \
            --file seeds/gateway_variable_map_gw_endesa_jaen.csv \
            --table gateway_variable_map
          python scripts/load_gateway_map.py \
            --file seeds/gateway_variable_map_gw_endesa_linares.csv \
            --table gateway_variable_map
          python scripts/load_aggregation_configs.py \
            --file seeds/aggregation_configs.csv \
            --table aggregation_configs

      - name: Smoke test (invoke lambda + autoconsumo checks)
        run: |
          python - <<'PY'
          import json
          import time
          from pathlib import Path

          now = int(time.time())
          fixtures = {
            "/tmp/ingest_event.json": "lambda/ingest_telemetry/test_event.json",
            "/tmp/ingest_autoconsumo_event.json": "lambda/ingest_telemetry/test_event_gw_autoconsumo_jaen.json",
          }
          for output_path, fixture_path in fixtures.items():
            payload = json.loads(Path(fixture_path).read_text(encoding="utf-8"))
            for meter in payload.get("meter", []):
              meter["time"] = now
            Path(output_path).write_text(json.dumps(payload), encoding="utf-8")
          PY
          aws lambda invoke \
            --function-name lambda_ingest_telemetry \
            --payload fileb:///tmp/ingest_event.json \
            /tmp/lambda_ingest_response.json
          python -c "import json; payload=json.load(open('/tmp/lambda_ingest_response.json','r',encoding='utf-8')); assert payload.get('status')=='ok'"
          aws lambda invoke \
            --function-name lambda_ingest_telemetry \
            --payload fileb:///tmp/ingest_autoconsumo_event.json \
            /tmp/lambda_ingest_autoconsumo_response.json
          python -c "import json; payload=json.load(open('/tmp/lambda_ingest_autoconsumo_response.json','r',encoding='utf-8')); assert payload.get('status')=='ok'"
          aws iot get-topic-rule \
            --rule-name uja_ingest_gw_autoconsumo_jaen \
            > /tmp/iot_rule_autoconsumo.json
          python -c "import json; payload=json.load(open('/tmp/iot_rule_autoconsumo.json','r',encoding='utf-8')); assert payload.get('rule', {}).get('ruleName')=='uja_ingest_gw_autoconsumo_jaen'"
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='uja-public-api'].id | [0]" --output text)
          export API_BASE="https://${API_ID}.execute-api.${AWS_REGION}.amazonaws.com/v1"
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request

          api_base = os.environ["API_BASE"]

          def fetch_json(path):
            with urllib.request.urlopen(f"{api_base}{path}", timeout=15) as response:
              return json.load(response)

          latest_path = "/realtime?campus=jaen&domain=fv&gateway_id=gw_autoconsumo_jaen"
          series_path = "/series/24h?campus=jaen&metric=fv_auto"

          latest_payload = None
          series_payload = None
          for attempt in range(12):
            latest_payload = fetch_json(latest_path)
            series_payload = fetch_json(series_path)
            latest_ids = {item.get("rt_id") for item in latest_payload.get("items", [])}
            has_latest = "uja.jaen.fv.auto.ct_total.p_kw" in latest_ids
            has_series = bool(series_payload.get("series"))
            if has_latest and has_series:
              break
            time.sleep(10)

          latest_ids = {item.get("rt_id") for item in latest_payload.get("items", [])}
          assert "uja.jaen.fv.auto.ct_total.p_kw" in latest_ids, latest_payload
          assert series_payload.get("series"), series_payload
          PY
