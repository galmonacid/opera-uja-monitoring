name: cd-backend

on:
  push:
    branches: [main]
    paths:
      - infra/lambda-ingest-telemetry.yaml
      - infra/iot-rule-gw-jaen-energia.yaml
      - lambda/**
      - scripts/**
      - seeds/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      STACK_PREFIX: uja
      LAMBDA_ARTIFACT_BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3

      - name: Package Lambda
        run: |
          zip -j /tmp/lambda_ingest_telemetry.zip lambda/ingest_telemetry/lambda_function.py

      - name: Upload Lambda artifact
        run: |
          aws s3 cp /tmp/lambda_ingest_telemetry.zip \
            "s3://${LAMBDA_ARTIFACT_BUCKET}/lambda/lambda_ingest_telemetry.zip"

      - name: Deploy Lambda stack
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-lambda-ingest-telemetry" \
            --template-file infra/lambda-ingest-telemetry.yaml \
            --parameter-overrides \
              FunctionName=lambda_ingest_telemetry \
              CodeS3Bucket="${LAMBDA_ARTIFACT_BUCKET}" \
              CodeS3Key=lambda/lambda_ingest_telemetry.zip \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Deploy IoT Rule
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_PREFIX}-iot-rule-gw-jaen-energia" \
            --template-file infra/iot-rule-gw-jaen-energia.yaml \
            --parameter-overrides IngestLambdaName=lambda_ingest_telemetry

      - name: Load gateway_variable_map
        run: |
          python scripts/load_gateway_map.py \
            --file seeds/gateway_variable_map_gw_jaen_energia.csv \
            --table gateway_variable_map

      - name: Smoke test (invoke lambda)
        run: |
          aws lambda invoke \
            --function-name lambda_ingest_telemetry \
            --payload fileb://lambda/ingest_telemetry/test_event.json \
            /tmp/lambda_ingest_response.json
          python - <<'PY'
import json
with open("/tmp/lambda_ingest_response.json", "r", encoding="utf-8") as handle:
    payload = json.load(handle)
assert payload.get("status") == "ok"
PY
