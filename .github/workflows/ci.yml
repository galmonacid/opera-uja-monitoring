name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytest cfn-lint

      - name: Validate CSV mappings
        run: python scripts/validate_gateway_map.py seeds/gateway_variable_map_gw_jaen_energia.csv

      - name: Lint CloudFormation
        run: cfn-lint infra/*.yaml

      - name: Run unit tests
        run: pytest -q
